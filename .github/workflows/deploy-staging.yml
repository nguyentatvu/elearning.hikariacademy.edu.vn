name: Deploy to Staging

# Auto-deploy to staging.hikariacademy.edu.vn whenever main is updated. (v2)
# The staging server pulls the new code via SSH and clears Laravel caches.
#
# Required GitHub repository secrets:
#   - STAGING_SSH_HOST  (e.g. 35.190.235.118)
#   - STAGING_SSH_PORT  (e.g. 22222)
#   - STAGING_SSH_USER  (e.g. developer)
#   - STAGING_SSH_KEY   (OpenSSH private key, full content)

on:
  push:
    branches:
      - main
  workflow_dispatch:        # Allow manual trigger from Actions UI

concurrency:
  group: deploy-staging
  cancel-in-progress: false # Wait for previous deploys to finish, never cancel mid-deploy

jobs:
  deploy:
    name: Pull and clear cache on staging
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          command_timeout: 10m
          script_stop: true   # Stop on first failed command
          script: |
            set -euo pipefail
            echo "==> Connected to $(hostname) as $(whoami)"
            echo "==> Pulling latest main into /home/haeldev/public_html"
            sudo -u haeldev bash -c '
              set -euo pipefail
              cd /home/haeldev/public_html
              echo "[before] HEAD: $(git rev-parse --short HEAD)"
              # Fast-forward only pull. Old git on the host (1.8.x) does not
              # update refs/remotes/origin/main when fetching a single branch,
              # so we use `git pull --ff-only` which only writes files that
              # actually changed in the new commits (delta update).
              git pull --ff-only origin main
              echo "[after]  HEAD: $(git rev-parse --short HEAD)"
              echo "==> Clearing Laravel caches"
              # Webapp runs on PHP 7.4 (php-fpm74). The default php in PATH
              # is 8.1 (or missing), which is incompatible with this Laravel
              # version, so we invoke 7.4 directly.
              PHP=/opt/alt/php-fpm74/usr/bin/php
              $PHP artisan config:clear
              $PHP artisan route:clear
              $PHP artisan view:clear
            '
            echo "==> Deploy completed successfully"
